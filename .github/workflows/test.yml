name: Run tests
permissions: {}

on: push

jobs:
  linter:
    name: Code linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          SKIP: no-commit-to-branch

  test:
    name: XSLT unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0

      - name: Run image
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1 # v4.0.0
        with:
          poetry-version: 1.7.0

      - name: Install libraries
        run: poetry install

      - name: Run tests with coverage
        run: poetry run pytest

  marklogic-unit-test:
    name: MarkLogic unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: "8.10.2"

      - name: Create docker network
        run: docker network create caselaw

      - name: Start MarkLogic
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait

      - name: Deploy MarkLogic configuration
        # No forest replicas on a single-node CI container.
        run: gradle mlWaitTillReady mlDeploy -PmlDatabaseNamesAndReplicaCounts=

      - name: Run MarkLogic unit tests
        run: gradle mlUnitTest
